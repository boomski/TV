# .github/workflows/update_aftermind.yml
name: Update Aftermind Streams

on:
  schedule:
    - cron: '0 * * * *' # elk uur
  workflow_dispatch: # handmatig triggeren

jobs:
  update-streams:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Check out de repo
      - name: Check out repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright asyncio
          playwright install chromium

      # 4️⃣ Run Aftermind scraper
      - name: Run Update_Aftermind_stream.py
        run: |
          python Update_Aftermind_stream.py

      # 5️⃣ Configure Git
      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      # 6️⃣ Commit en push als TCL.m3u is veranderd
      - name: Commit changes
        run: |
          git add TCL.m3u
          git diff --cached --quiet || git commit -m "Update Aftermind streams [skip ci]"
          git push
