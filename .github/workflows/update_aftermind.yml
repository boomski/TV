name: Update Aftermind Streams

on:
  schedule:
    - cron: '0 * * * *'  # elk uur
  workflow_dispatch:

jobs:
  update_streams:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install

      - name: Run Aftermind updater
        run: python Update_Aftermind_stream.py

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add TCL.m3u
          git commit -m "Update Aftermind streams" || echo "Nothing to commit"
          git push
