name: Update MediaKlikk Playlist

on:
  schedule:
    - cron: "0 * * * *"  # elk uur
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install playwright m3u8
          playwright install

      - name: Run MediaKlikk headless script
        run: python3 Update_Mediaklikk_streams.py

      - name: Commit playlist
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add TCL.m3u
          git commit -m "Update MediaKlikk streams" || exit 0
          git pushname: Update MediaKlikk Playlist

on:
  schedule:
    - cron: "0 * * * *"   # elk uur op minuut 0
  workflow_dispatch:       # handmatig starten via GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v3

      # 2️⃣ Setup Python
      - uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      # 3️⃣ Installeer dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests bs4 m3u8

      # 4️⃣ Run MediaKlikk script
      - name: Run MediaKlikk script
        run: python3 Update_Mediaklikk_streams.py

      # 5️⃣ Commit en push playlist
      - name: Commit playlist
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add TCL.m3u
          git commit -m "Update MediaKlikk streams" || exit 0
          git push
