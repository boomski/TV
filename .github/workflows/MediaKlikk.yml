name: Update MediaKlikk Streams

on:
  schedule:
    - cron: '0 * * * *'   # elk uur
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright m3u8
          playwright install chromium

      - name: Run script
        run: |
          python3 Update_Mediaklikk_streams.py

      - name: Commit playlist update
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add TCL.m3u
          git commit -m "Update MediaKlikk streams" || echo "No changes"
          git push
