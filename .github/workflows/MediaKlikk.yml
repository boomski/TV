name: Update MediaKlikk Playlist

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.x"
      - run: pip install requests
      - run: python3 scripts/Update_Mediaklikk_streams.py
      - run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add playlists/TCL.m3u
          git commit -m "Update MediaKlikk streams" || exit 0
          git push
