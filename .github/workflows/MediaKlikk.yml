name: Update Mediaklikk Streams

on:
  schedule:
    # Elke 1 uur
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-mediaklikk:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout de repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.14"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          playwright install chromium

      # 4️⃣ Run scraper script
      - name: Run Update_Mediaklikk_streams.py
        run: python Update_Mediaklikk_streams.py

      # 5️⃣ Commit playlist update
      - name: Commit playlist update
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add TCL.m3u
          git commit -m "Auto update Mediaklikk streams" || echo "No changes to commit"
          git push
