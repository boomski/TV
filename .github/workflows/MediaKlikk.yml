name: Update MediaKlikk Streams

# Trigger: elk uur en handmatig
on:
  schedule:
    - cron: '0 * * * *'   # elke uur op het hele uur
  workflow_dispatch:

jobs:
  update-mediaklikk:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Code uit je repo ophalen
      - uses: actions/checkout@v3

      # 2️⃣ Python installeren
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      # 3️⃣ Dependencies installeren
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install playwright m3u8
          playwright install chromium

      # 4️⃣ Scraper runnen
      - name: Run MediaKlikk scraper
        run: python3 Update_Mediaklikk_streams.py
