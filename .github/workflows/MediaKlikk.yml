name: Update MediaKlikk Playlist

on:
  schedule:
    - cron: "0 * * * *"  # elk uur
  workflow_dispatch:     # handmatig triggeren

jobs:
  update_playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install playwright m3u8
          playwright install

      - name: Run MediaKlikk headless script
        run: python3 Update_Mediaklikk_streams.py

      - name: Commit playlist
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add TCL.m3u
          git commit -m "Update MediaKlikk streams" || echo "No changes to commit"
          git push
