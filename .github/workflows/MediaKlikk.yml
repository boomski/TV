name: Update MediaKlikk Playlist

# Run automatisch elke 30 minuten en handmatig via “Run workflow”
on:
  schedule:
    - cron: "*/59 * * * *"   # elke 30 minuten
  workflow_dispatch:          # handmatig starten

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Haal de repo op
      - uses: actions/checkout@v3

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.x

      # 3️⃣ Installeer dependencies
      - name: Install dependencies
        run: pip install requests

      # 4️⃣ Run MediaKlikk scraper
      - name: Run MediaKlikk script
        run: python3 scripts/Update_Mediaklikk_streams.py

      # 5️⃣ Commit en push playlist
      - name: Commit playlist
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add playlists/TCL.m3u
          git commit -m "Update MediaKlikk streams" || exit 0
          git push
