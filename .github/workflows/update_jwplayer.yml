name: JWPlayer Auto Update

on:
  schedule:
    - cron: '0 * * * *' # elk uur
  workflow_dispatch: # handmatige trigger

jobs:
  update_jwplayer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          playwright install chromium

      - name: Run JWPlayer scraper
        run: python Update_JWPlayer_streams.py

      - name: Commit updated playlist
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@users.noreply.github.com"
          git add TCL.m3u
          git diff --cached --quiet || git commit -m "Update JWPlayer streams"
          git push
