name: JWPlayer Scraper

on:
  schedule:
    - cron: '0 */1 * * *' # elk uur
  push:
    branches: [ "main" ]

jobs:
  scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests playwright
          playwright install chromium

      - name: Run JWPlayer scraper
        run: python Update_JWPlayer_streams.py
