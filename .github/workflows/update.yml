name: Update ALL Streams (Stable)

on:
  schedule:
    - cron: "*/30 * * * *"   # elke 30 min
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Python setup
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Install dependencies (alles in 1x = sneller)
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yt-dlp playwright requests selenium webdriver-manager
          playwright install --with-deps chromium

      # 4️⃣ Maak scripts uitvoerbaar
      - name: Make scripts executable
        run: |
          chmod +x ./scrape.sh || true

      # 5️⃣ Run ALLE scrapers (no fail = pipeline blijft draaien)
      - name: Run TCL scrape.sh
        run: ./scrape.sh || true

      - name: Run YTDLP Streams
        run: python ./Update_YTDLP_streams.py || true

      - name: Run Twitch
        run: python Update_Twitch.py || true

      - name: Run Aftermind
        run: python Update_Aftermind_stream.py || true

      - name: Run JWPlayer
        run: python Update_JWPlayer_streams.py || true

      - name: Run VPI
        run: python Update_VPI_stream.py || true

      # 6️⃣ Commit & Push (ULTRA STABIEL)
      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          # alles toevoegen (belangrijk!)
          git add -A

          # commit alleen als nodig
          git diff --cached --quiet || git commit -m "📡 All streams updated"

          # 🔥 FIX: maak working tree clean
          git reset --hard

          # 🔁 retry push (tegen race conditions)
          for i in 1 2 3 4 5
          do
            echo "🔄 Sync poging $i"

            git pull origin master --rebase

            if git push origin master; then
              echo "✅ Push gelukt"
              break
            fi

            echo "⚠️ Push conflict, retry..."
            sleep 3
          done
