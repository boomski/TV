name: Update ALL Streams (Stable)

on:
  schedule:
    - cron: "*/30 * * * *"   # elke 30 minuten
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Debug: check bestanden in de root
      - name: Debug files in repo
        run: |
          echo "📍 Current directory:"
          pwd
          echo "📂 Files in repo root:"
          ls -la

      # 3️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 4️⃣ Install dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yt-dlp playwright requests selenium webdriver-manager
          playwright install --with-deps chromium

      # 5️⃣ Maak bash scripts uitvoerbaar
      - name: Make scripts executable
        run: chmod +x ./scrape.sh || true

      # 6️⃣ Run all scrapers parallel
      - name: Run all scrapers
        run: |
          python Update_Aftermind_stream.py || true &
          python Update_JWPlayer_streams.py || true &
          python Update_VPI_stream.py || true &
          python Update_Twitch.py || true &
          python Update_ytdlp.py || true &
          ./scrape.sh || true &
          
          wait

      # 7️⃣ Commit & Push veilig
      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add -A
          git diff --cached --quiet || git commit -m "📡 All streams updated"

          # Hard reset voor clean working tree
          git reset --hard

          # Retry push loop
          for i in 1 2 3 4 5; do
            echo "🔄 Push poging $i"
            git pull origin master --rebase
            if git push origin master; then
              echo "✅ Push gelukt"
              break
            fi
            echo "⚠️ Push conflict, retry..."
            sleep 3
          done
